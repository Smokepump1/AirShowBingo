<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airshow People Bingo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>Airshow People Bingo</h1>

    <p class="subtitle">
      Tap squares as you spot them. Get 5 in a row and call BINGO.
    </p>

    <div class="controls">
      <button id="newCardBtn" type="button">New Card</button>
      <button id="resetBtn" type="button">Reset Marks</button>
    </div>

    <div id="message" class="message">New card generated.</div>

    <div class="bingo-letters" aria-label="Bingo column letters">
      <div>B</div>
      <div>I</div>
      <div>N</div>
      <div>G</div>
      <div>O</div>
    </div>

    <div id="bingoBoard" class="bingo-board" aria-label="Bingo board"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
